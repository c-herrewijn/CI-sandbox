name: Click Bench Runner Dev
on:
  workflow_dispatch:

env:
  mounted_directory_name: mount-point
  REGESSION_THRESHOLD_SECONDS: 1.0

jobs:
  start-runner:
    name: Start self-hosted ec2 runner
    runs-on: ubuntu-latest
    env:
      instance_id: i-0dc3a6e4c002300b7
    steps:
      - name: Start EC2 runner
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          AWS_DEFAULT_REGION: us-east-1
        run: aws ec2 start-instances --instance-id ${{ env.instance_id }}

  run-action:
    name: Action
    needs:
      - start-runner
    runs-on: self-hosted
    steps:
      - run: echo test123

  shutdown:
    name: Stop self-hosted ec2 runner
    env:
      instance_id: i-0dc3a6e4c002300b7
    if: always()
    runs-on: ubuntu-latest
    needs:
      - start-runner
      - run-action
    steps:
      - name: Stop EC2 runner
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          AWS_DEFAULT_REGION: us-east-1
        run: aws ec2 stop-instances --instance-id ${{ env.instance_id }}
