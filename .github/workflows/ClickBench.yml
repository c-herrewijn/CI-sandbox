name: Click Bench Runner Dev
on:
  workflow_dispatch:

jobs:
  start-runner:
    name: Start self-hosted ec2 runner
    runs-on: ubuntu-latest
    env:
      instance_id: i-0dc3a6e4c002300b7
    steps:
      - name: Start EC2 runner
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          AWS_DEFAULT_REGION: eu-north-1
        run: aws ec2 start-instances --instance-id ${{ env.instance_id }}
      - name: Wait for instance running
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          AWS_DEFAULT_REGION: eu-north-1
        run: aws ec2 wait instance-running --instance-ids ${{ env.instance_id }}
      - name: Wait for runner to register
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for self-hosted runner to come online..."
          for i in $(seq 1 30); do
            STATUS=$(gh api repos/${{ github.repository }}/actions/runners \
              --jq '.runners[] | select(.status=="online") | .status' | head -1)
            if [ "$STATUS" = "online" ]; then
              echo "Runner is online"
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, waiting 10s..."
            sleep 10
          done
          echo "Runner did not come online in time"
          exit 1

  run-action:
    name: Action
    needs:
      - start-runner
    runs-on: self-hosted
    steps:
      - run: echo test123

  shutdown:
    name: Stop self-hosted ec2 runner
    env:
      instance_id: i-0dc3a6e4c002300b7
    if: always()
    runs-on: ubuntu-latest
    needs:
      - start-runner
      - run-action
    steps:
      - name: Stop EC2 runner
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          AWS_DEFAULT_REGION: eu-north-1
        run: aws ec2 stop-instances --instance-id ${{ env.instance_id }}
