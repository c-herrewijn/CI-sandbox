name: Compile DuckDB Debug
on:
  workflow_dispatch:
    inputs:
      duckdbRepo:
        description: "duckdb repository"
        required: true
        type: string
        default: duckdb/duckdb
      ref:
        description: "duckdb branch, tag, or full-length SHA"
        required: true
        type: string
        # oldest usable ref: 4ebeb16350eb2f819d682c581490af460dd0c995
        default: v1.5.1

jobs:
  compile-duckdb:
    name: Build DuckDB debug
    runs-on: ubuntu-24.04
    outputs:
        duckdb-sha: ${{ steps.get_duckdb_version.outputs.duckdb-sha }}

    steps:
      - name: print inputs
        run: |
          echo $GITHUB_SHA
          echo ${{ inputs.duckdbRepo }}
          echo ${{ inputs.ref }}

      - name: Checkout duckdb
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: ${{ inputs.duckdbRepo }}
          ref: ${{ inputs.ref }}
          path: duckdb

      - name: Install DuckDB dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@main
        with:
          key: ${{ github.job }}

      - name: Build DuckDB
        working-directory: duckdb
        env:
          GEN: ninja
          EXPORT_DYNAMIC_SYMBOLS: 1
          BUILD_JEMALLOC: 1
          REDUCE_SYMBOLS: 1
        run: |
          make debug

      - name: duckdb version
        id: get_duckdb_version
        working-directory: duckdb
        run: |
          ./build/debug/duckdb --version
          echo "duckdb-sha=$(git log -n 1 --pretty=format:%H)" >> "$GITHUB_OUTPUT"
